<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tronavo — Coming Soon</title>
    <link rel="icon" type="image/png" href="images/Tronavo-Favicon.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="grid"></div>
    <div class="vignette"></div>

    <!-- Circuit lines -->
    <div class="circuit-line horizontal line1"></div>
    <div class="circuit-line horizontal line2"></div>
    <div class="circuit-line vertical line3"></div>
    <div class="circuit-line vertical line4"></div>

    <!-- Ambient particles -->
    <div class="particles">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>

    <main class="container">

        <div class="status-line">
            <span class="status-dot"></span>
            <span class="status-text">Automating&nbsp;what's&nbsp;next</span>
        </div>

        <!-- Signature element: vortex rings drawn around the mark -->
        <div class="mark">
            <div class="vortex-ring ring-outer"></div>
            <div class="vortex-ring ring-mid"></div>
            <div class="vortex-ring ring-inner"></div>
            <!-- Placeholder mark — swap src for your real Tronavo-Logo.png when ready -->
            <img src="images/Tronavo-Favicon.png" alt="Tronavo" class="logo-image">
        </div>

        <!-- <h1 class="logo">Tron<span class="logo-soft">avo</span></h1> -->
        <h1 class="logo">Tronavo</h1>
        <p class="tagline">Automate Workflows, Drive Growth</p>

        <div class="coming-soon">
            Coming Soon<span class="dots" aria-hidden="true"></span>
        </div>

        <div class="progress-track" role="img" aria-label="Build progress indicator">
            <div class="progress-fill"></div>
        </div>

    </main>

</body>

</html>
